  return (
    <div>
      {pl.url && <div style={{ marginBottom:14 }}><PlaylistLink url={pl.url} /></div>}
      <div style={{ marginBottom:14 }}>
        {[["Games",pl.totalGames],["Songs",pl.totalSongs],["Time",`${Math.round(pl.totalMinutes)}m`]].map(([l,v]) => (
          <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${T.border}` }}>
            <span style={{ color:T.muted, fontSize:13 }}>{l}</span>
            <span style={{ color:T.text, fontWeight:700 }}>{v}</span>
          </div>
        ))}
      </div>
      <Lbl>Overall Category %</Lbl>
      <div style={{ marginBottom:14 }}>
        {[["title","Song Title 🎵"],["artist","Artist 🎤"],["album","Album 💿"]].map(([k,l]) => {
          const [c,p] = pl.cats[k];
          if (!p) return null;
          const pct = Math.round((c/p)*100);
          return (
            <div key={k} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <span style={{ color:T.muted, fontSize:13 }}>{l}</span>
                <span style={{ color:T.text, fontSize:13, fontWeight:600 }}>{fmtPct(c,p)} ({c}/{p})</span>
              </div>
              <div style={{ height:6, borderRadius:3, background:T.border }}>
                <div style={{ height:6, borderRadius:3, width:`${pct}%`, background:`linear-gradient(90deg,${T.accent},${T.accentL})` }} />
              </div>
            </div>
          );
        })}
      </div>
      {players.length>0 && <>
        <Lbl>Players on this playlist</Lbl>
        {players.map((p,i) => (
          <div key={p.name}>
            <div onClick={() => setExpPlayer(expPlayer===p.name?null:p.name)}
              style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 0", borderBottom:`1px solid ${T.border}`, cursor:"pointer" }}>
              <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, background:PC[i%PC.length],
                display:"flex", alignItems:"center", justifyContent:"center", color:"#0E1117", fontWeight:800, fontSize:12 }}>
                {p.name[0]?.toUpperCase()}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ color:T.text, fontWeight:700, fontSize:14 }}>{p.name}</div>
                <div style={{ color:T.muted, fontSize:11 }}>{p.songsPlayed} songs · {Math.round(p.minutesPlayed)}m</div>
              </div>
              <div style={{ textAlign:"right", marginRight:8 }}>
                <div style={{ color:T.accent, fontWeight:800, fontSize:16 }}>{p.correct}</div>
                {p.incorrect>0 && <div style={{ color:T.red, fontSize:11 }}>-{p.incorrect}</div>}
              </div>
              <span style={{ color:T.muted, fontSize:14, display:"inline-block", transform:expPlayer===p.name?"rotate(90deg)":"none", transition:"transform .15s" }}>›</span>
            </div>
            {expPlayer===p.name && (
              <div style={{ background:T.surface, borderRadius:10, padding:12, margin:"6px 0 10px" }}>
                {[["Points",p.correct,T.accent],["Wrong",p.incorrect,T.red],
                  ["Pts/Min",p.minutesPlayed>0?(p.correct/p.minutesPlayed).toFixed(2):"—",T.blue],
                  ["+/-",p.incorrect?(p.correct/p.incorrect).toFixed(2):p.correct>0?"∞":"—",T.green]
                ].map(([l,v,c]) => (
                  <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", borderBottom:`1px solid ${T.border}` }}>
                    <span style={{ color:T.muted, fontSize:12 }}>{l}</span>
                    <span style={{ color:c, fontWeight:700, fontSize:12 }}>{v}</span>
                  </div>
                ))}
                {[["title","Title 🎵"],["artist","Artist 🎤"],["album","Album 💿"]].map(([k,l]) => {
                  const [c,pos] = p[k]; if (!pos) return null;
                  return (
                    <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", borderBottom:`1px solid ${T.border}` }}>
                      <span style={{ color:T.muted, fontSize:12 }}>{l}</span>
                      <span style={{ color:T.text, fontSize:12 }}>{fmtPct(c,pos)} ({c}/{pos})</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </>}
    </div>
  );
}

// ─── History ──────────────────────────────────────────────────────────────────
function HistoryScreen({ myGames, onUpdateGame, onDeleteGame, onBack }) {
  const [search, setSearch] = useState("");
  const [fMode, setFMode]   = useState("all");
  const [editGame, setEditGame] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const filtered = myGames.filter(g => {
    if (fMode!=="all" && g.mode!==fMode) return false;
    if (search) {
      const q = search.toLowerCase();
      return g.players.map(p=>p.name.toLowerCase()).join(" ").includes(q) ||
             (g.playlist||"").toLowerCase().includes(q);
    }
    return true;
  });

  async function saveEdit(updated) {
    await db.saveGame(updated);
    onUpdateGame(updated);
    setEditGame(null);
  }
  async function confirmDelete(g) {
    await db.deleteGame(g.id);
    onDeleteGame(g.id);
    setDeleteConfirm(null);
  }

  return (
    <div style={{ padding:16, maxWidth:460, margin:"0 auto", paddingBottom:40 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <h2 style={{ color:T.text, fontWeight:800, fontSize:20 }}>My History</h2>
      </div>

      <TInput value={search} onChange={setSearch} placeholder="Search by player or playlist…" style={{ marginBottom:10 }} />

      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[["all","All"],["solo","Solo"],["multi","Multi"]].map(([v,l]) => (
          <button key={v} onClick={() => setFMode(v)}
            style={{ flex:1, padding:"7px", borderRadius:8,
              border:`1px solid ${fMode===v?T.accent:T.border}`,
              background: fMode===v?`${T.accent}22`:T.card,
              color: fMode===v?T.accent:T.muted, fontSize:12, fontWeight:600, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>

      {filtered.length===0
        ? <div style={{ color:T.muted, textAlign:"center", padding:40 }}>No games found</div>
        : filtered.map(g => (
          <Card key={g.id} style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1, marginRight:10 }}>
                <div style={{ color:T.text, fontWeight:700, fontSize:14 }}>{g.players.map(p=>p.name).join(", ")}</div>
                <div style={{ color:T.muted, fontSize:12, marginTop:2 }}>
                  {new Date(g.startedAt).toLocaleDateString()} · {fmtTime(g.elapsedSeconds||0)} · {(g.songs||[]).filter(s=>!s.skipped).length} songs
                  {g.playlist && ` · ${g.playlist}`}
                </div>
                {g.playlistUrl && <div style={{ marginTop:4 }}><PlaylistLink url={g.playlistUrl} /></div>}
                <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
                  {computeScores(g.players, g.songs||[], g.mode).map(s => (
                    <span key={s.name} style={{ fontSize:12, color:T.accent, fontWeight:700 }}>{s.name}: {s.correct}</span>
                  ))}
                </div>
              </div>
              <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                <Btn variant="ghost" small onClick={() => setEditGame({...g})}>Edit</Btn>
                <Btn variant="danger" small onClick={() => setDeleteConfirm(g)}>Delete</Btn>
              </div>
            </div>
          </Card>
        ))
      }

      <Modal open={!!editGame} onClose={() => setEditGame(null)} title="Edit Game">
        {editGame && <GameEditForm game={editGame} onChange={setEditGame} onSave={saveEdit} onCancel={() => setEditGame(null)} />}
      </Modal>
      <Modal open={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="Delete Game?">
        {deleteConfirm && (
          <div>
            <p style={{ color:T.muted, fontSize:14, marginBottom:8 }}>
              This permanently removes the game and all its stats.
            </p>
            <p style={{ color:T.text, fontSize:13, fontWeight:600, marginBottom:16 }}>
              {deleteConfirm.players.map(function(p){return p.name;}).join(", ")} - {new Date(deleteConfirm.startedAt).toLocaleDateString()} - {(deleteConfirm.songs||[]).filter(function(s){return !s.skipped;}).length} songs
            </p>
            <div style={{ display:"flex", gap:10 }}>
              <Btn variant="ghost" onClick={() => setDeleteConfirm(null)} style={{ flex:1 }}>Cancel</Btn>
              <Btn variant="danger" onClick={() => confirmDelete(deleteConfirm)} style={{ flex:1 }}>Delete Forever</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function GameEditForm({ game, onChange, onSave, onCancel }) {
  return (
    <div>
      <Lbl>Playlist</Lbl>
      <TInput value={game.playlist||""} onChange={v=>onChange({...game,playlist:v})} placeholder="Playlist name" style={{ marginBottom:10 }} />
      <Lbl>Playlist URL (optional)</Lbl>
      <TInput value={game.playlistUrl||""} onChange={v=>onChange({...game,playlistUrl:v||null})} placeholder="Spotify, YouTube, Apple Music…" style={{ marginBottom:14 }} />
      {game.playlistUrl && <div style={{ marginBottom:14 }}><PlaylistLink url={game.playlistUrl} /></div>}
      <Lbl>Player Names</Lbl>
      {game.players.map((p,i) => (
        <div key={p.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:PC[i], flexShrink:0 }} />
          <TInput value={p.name}
            onChange={v => onChange({ ...game, players:game.players.map((pl,j)=>j===i?{...pl,name:v}:pl) })} />
        </div>
      ))}
      <Lbl style={{ marginTop:14 }}>Songs</Lbl>
      <div style={{ maxHeight:180, overflow:"auto", marginBottom:14 }}>
        {(game.songs||[]).map((s,si) => (
          <div key={s.id} style={{ padding:"8px 0", borderBottom:`1px solid ${T.border}`,
            display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:s.skipped?T.muted:T.text, fontSize:13 }}>Song {si+1}{s.skipped?" (skipped)":""}</span>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap", justifyContent:"flex-end" }}>
              {["title","artist","album"].map(cat => {
                const r = s[cat]; if (!r) return null;
                const w = r.type==="player" ? game.players.find(p=>p.id===r.playerId)?.name : r.type;
                return <span key={cat} style={{ fontSize:10, color:T.muted, background:T.surface, padding:"2px 5px", borderRadius:4 }}>{cat[0].toUpperCase()}: {w||"—"}</span>;
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:10 }}>
        <Btn variant="ghost" onClick={onCancel} style={{ flex:1 }}>Cancel</Btn>
        <Btn variant="primary" onClick={() => onSave(game)} style={{ flex:1 }}>Save</Btn>
      </div>
    </div>
  );
}

// ─── Playlists Manager ────────────────────────────────────────────────────────
function PlaylistScreen({ playlists, onBack }) {
  const [name, setName]     = useState("");
  const [url, setUrl]       = useState("");
  const [editPl, setEditPl] = useState(null);
  const [saving, setSaving] = useState(false);

  async function add() {
    if (!name.trim() || playlists.find(p=>p.name===name.trim())) return;
    setSaving(true);
    try {
      await db.savePlaylist({ id:uid(), name:name.trim(), url:url.trim()||null });
      setName(""); setUrl("");
    } finally {
      setSaving(false);
    }
  }

  async function saveEdit() {
    if (!editPl) return;
    setSaving(true);
    try {
      await db.savePlaylist({ ...editPl, name:editPl.name.trim(), url:editPl.url?.trim()||null });
      setEditPl(null);
    } finally {
      setSaving(false);
    }
  }

  async function remove(id) {
    await db.deletePlaylist(id);
  }

  return (
    <div style={{ padding:16, maxWidth:460, margin:"0 auto", paddingBottom:40 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <h2 style={{ color:T.text, fontWeight:800, fontSize:20 }}>Playlists</h2>
      </div>

      <Card style={{ marginBottom:14 }}>
        <Lbl>Add Playlist</Lbl>
        <TInput value={name} onChange={setName} placeholder="Playlist name" style={{ marginBottom:8 }} />
        <TInput value={url} onChange={setUrl} placeholder="URL (optional — Spotify, YouTube, etc.)" style={{ marginBottom:10 }} />
        <Btn onClick={add} disabled={!name.trim() || saving} style={{ width:"100%" }}>
          {saving ? "Saving…" : "Add Playlist"}
        </Btn>
      </Card>

      {playlists.length===0
        ? <div style={{ color:T.muted, textAlign:"center", padding:40 }}>No playlists saved yet</div>
        : playlists.map(pl => (
          <Card key={pl.id} style={{ marginBottom:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:T.text, fontWeight:600, fontSize:14 }}>🎵 {pl.name}</div>
                {pl.url && <div style={{ marginTop:4 }}><PlaylistLink url={pl.url} /></div>}
              </div>
              <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                <Btn variant="ghost" small onClick={() => setEditPl({...pl, url:pl.url||""})}>Edit</Btn>
                <Btn variant="danger" small onClick={() => remove(pl.id)}>Remove</Btn>
              </div>
            </div>
          </Card>
        ))
      }

      <Modal open={!!editPl} onClose={() => setEditPl(null)} title="Edit Playlist">
        {editPl && (
          <div>
            <Lbl>Name</Lbl>
            <TInput value={editPl.name} onChange={v=>setEditPl({...editPl,name:v})} placeholder="Playlist name" style={{ marginBottom:12 }} />
            <Lbl>URL (optional)</Lbl>
            <TInput value={editPl.url||""} onChange={v=>setEditPl({...editPl,url:v})} placeholder="Spotify, YouTube, Apple Music…" style={{ marginBottom:16 }} />
            {editPl.url && <div style={{ marginBottom:14 }}><PlaylistLink url={editPl.url} /></div>}
            <div style={{ display:"flex", gap:10 }}>
              <Btn variant="ghost" onClick={() => setEditPl(null)} style={{ flex:1 }}>Cancel</Btn>
              <Btn variant="primary" onClick={saveEdit} disabled={!editPl.name.trim() || saving} style={{ flex:1 }}>
                {saving ? "Saving…" : "Save"}
              </Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─── Top Bar ─────────────────────────────────────────────────────────────────
function TopBar({ user, onOpenAccount }) {
  return (
    <div style={{ position:"sticky", top:0, zIndex:100, background:T.bg,
      borderBottom:`1px solid ${T.border}`, padding:"8px 16px",
      display:"flex", justifyContent:"flex-end", alignItems:"center" }}>
      <button onClick={onOpenAccount}
        style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
        {user.photoURL
          ? <img src={user.photoURL} style={{ width:28, height:28, borderRadius:"50%" }} alt="" />
          : <div style={{ width:28, height:28, borderRadius:"50%", background:T.accent,
              display:"flex", alignItems:"center", justifyContent:"center",
              color:"#0E1117", fontWeight:800, fontSize:13 }}>
              {user.displayName?.[0]?.toUpperCase()}
            </div>
        }
      </button>
    </div>
  );
}

// ─── Account Screen (sign out tucked here) ────────────────────────────────────
function AccountModal({ open, onClose, user }) {
  function signOut() {
    fbAuth.signOut();
    onClose();
  }
  return (
    <Modal open={open} onClose={onClose} title="Account">
      <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}>
        {user.photoURL
          ? <img src={user.photoURL} style={{ width:48, height:48, borderRadius:"50%" }} alt="" />
          : <div style={{ width:48, height:48, borderRadius:"50%", background:T.accent, display:"flex", alignItems:"center", justifyContent:"center", color:"#0E1117", fontWeight:800, fontSize:20 }}>
              {user.displayName?.[0]?.toUpperCase()}
            </div>
        }
        <div>
          <div style={{ color:T.text, fontWeight:700, fontSize:16 }}>{user.displayName}</div>
          <div style={{ color:T.muted, fontSize:13 }}>{user.email}</div>
        </div>
      </div>
      <Btn variant="danger" onClick={signOut} style={{ width:"100%" }}>Sign Out</Btn>
    </Modal>
  );
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState]     = useState("loading"); // loading | signed-out | profile-setup | ready
  const [firebaseUser, setFirebaseUser] = useState(null);
  const [appUser, setAppUser]         = useState(null);   // { uid, displayName, email, photoURL }
  const [myGames, setMyGames]         = useState([]);
  const [allGames, setAllGames]       = useState([]);
  const [playlists, setPlaylists]     = useState([]);
  const [screen, setScreen]           = useState("home");
  const [currentGame, setCurrentGame] = useState(null);
  const [lastGame, setLastGame]       = useState(null);
  const [showAccount, setShowAccount] = useState(false);
  const [spotifyReady, setSpotifyReady] = useState(false);

  useEffect(function() {
    spotifyHandleRedirect().then(function(returnScreen) {
      if (returnScreen && returnScreen !== "home") setScreen("home");
    }).finally(function() { setSpotifyReady(true); });
  }, []);

  const sp = useSpotify(spotifyReady);

  // ── Auth listener ──────────────────────────────────────────────────────────
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(async (fbUser) => {
      if (!fbUser) {
        setAuthState("signed-out");
        setFirebaseUser(null);
        setAppUser(null);
        return;
      }
      setFirebaseUser(fbUser);
      // Check if user profile exists in DB
      const profile = await db.getUser(fbUser.uid);
      if (!profile || !profile.displayName) {
        // First time — show profile setup with Google name pre-filled
        setAppUser({ uid:fbUser.uid, displayName:fbUser.displayName||"", email:fbUser.email, photoURL:fbUser.photoURL });
        setAuthState("profile-setup");
      } else {
        setAppUser({ uid:fbUser.uid, ...profile });
        setAuthState("ready");
      }
    });
    return unsub;
  }, []);

  // ── Data listeners (only when ready) ──────────────────────────────────────
  useEffect(() => {
    if (authState !== "ready" || !appUser) return;
    const unsubMine = db.listenMyGames(appUser.uid, setMyGames);
    const unsubAll  = db.listenAllGames(setAllGames);
    const unsubPl   = db.listenPlaylists(setPlaylists);
    return () => { unsubMine(); unsubAll(); unsubPl(); };
  }, [authState, appUser?.uid]);

  async function handleProfileSave(displayName) {
    const profile = { displayName, email:firebaseUser.email, photoURL:firebaseUser.photoURL||null };
    await db.setUser(firebaseUser.uid, profile);
    setAppUser({ uid:firebaseUser.uid, ...profile });
    setAuthState("ready");
  }

  function startGame(config) {
    const game = {
      id:uid(), startedAt:Date.now(), status:"active",
      ownerUid: appUser.uid, ownerName: appUser.displayName,
      mode:config.mode, players:config.players, albumEnabled:config.albumEnabled,
      playlist:config.playlist, playlistUrl:config.playlistUrl||null,
      songs:[], elapsedSeconds:0,
    };
    setCurrentGame(game);
    setScreen("game");
  }

  function handleEndGame(finalGame) {
    setCurrentGame(null);
    setLastGame(finalGame);
    setScreen("summary_" + finalGame.id);
  }

  const summaryId = screen.startsWith("summary_") ? screen.slice("summary_".length) : null;

  // ── Render ─────────────────────────────────────────────────────────────────
  if (authState === "loading") {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:T.bg }}>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🎶</div>
          <Spinner size={28} />
        </div>
      </div>
    );
  }

  if (authState === "signed-out") return <AuthScreen onSignedIn={() => {}} />;
  if (authState === "profile-setup") return <ProfileSetupScreen googleName={appUser?.displayName} onSave={handleProfileSave} />;

  return (
    <div style={{ minHeight:"100vh", background:T.bg }}>
      {screen !== "game" && <TopBar user={appUser} onOpenAccount={() => setShowAccount(true)} />}
      <AccountModal open={showAccount} onClose={() => setShowAccount(false)} user={appUser} />

      {screen==="home" && <HomeScreen onNav={setScreen} myGames={myGames} user={appUser} sp={sp} />}
      {screen==="setup" && <SetupScreen playlists={playlists} onStart={startGame} onBack={() => setScreen("home")} user={appUser} />}
      {screen==="game" && currentGame && (
        <GameScreen game={currentGame} onUpdateGame={setCurrentGame} onEndGame={handleEndGame}
          playlists={playlists} sp={sp} />
      )}
      {summaryId && (() => {
        // Use lastGame first (avoids race with Firebase listener after endGame),
        // then fall back to myGames/allGames for viewing historical summaries
        const g = (lastGame?.id === summaryId ? lastGame : null)
               || myGames.find(g=>g.id===summaryId)
               || allGames.find(g=>g.id===summaryId);
        return g ? <SummaryScreen game={g} onHome={() => setScreen("home")} /> : null;
      })()}
      {screen==="scoreboard" && <ScoreboardScreen allGames={allGames} playlists={playlists} onBack={() => setScreen("home")} />}
      {screen==="history"    && <HistoryScreen myGames={myGames} onUpdateGame={g => {
          setMyGames(prev => prev.map(x=>x.id===g.id?g:x));
        }} onDeleteGame={id => {
          setMyGames(prev => prev.filter(x=>x.id!==id));
        }} onBack={() => setScreen("home")} />}
      {screen==="playlists"  && <PlaylistScreen playlists={playlists} onBack={() => setScreen("home")} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<!-- Spotify Web Playback SDK loads LAST so onSpotifyWebPlaybackSDKReady is already defined -->
