<script>

const firebaseConfig = {

  projectId: "song-game-739c7",

firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb   = firebase.database();

// ─── Firebase helpers ─────────────────────────────────────────────────────────
const db = {
  // Users
  getUser:    (uid)       => fbDb.ref(`users/${uid}`).get().then(s => s.val()),
  setUser: (uid, data) => {
    const d = { displayName: data.displayName, email: data.email };
    if (data.photoURL) d.photoURL = data.photoURL;
    return fbDb.ref(`users/${uid}`).set(d);
  },
  updateUser: (uid, data) => fbDb.ref(`users/${uid}`).update(data),

  // Search registered users by name (client-side filter, fine for small groups)
  searchUsers: (query) => fbDb.ref('users').get().then(snap => {
    if (!snap.val()) return [];
    const q = query.toLowerCase().trim();
    return Object.entries(snap.val())
      .map(([uid, u]) => ({ uid, ...u }))
      .filter(u => u.displayName && u.displayName.toLowerCase().includes(q));
  }),

  // Games — write
  saveGame: (game) => {
    // Firebase rejects null values — strip optional nulls before writing
    const data = { ...game };
    if (data.playlistUrl === null) delete data.playlistUrl;
    if (data.ownerName   === null) delete data.ownerName;
    // Strip null accountUid from each player object
    if (data.players) {
      data.players = data.players.map(p => {
        if (!p.accountUid) { const { accountUid, ...rest } = p; return rest; }
        return p;
      });
    }
    return fbDb.ref(`games/${game.id}`).set(data);
  },
  updateGame: (gameId, data) => fbDb.ref(`games/${gameId}`).update(data),

  // Games — read (owner's own games)
  listenMyGames: (uid, cb) => {
    const ref = fbDb.ref('games').orderByChild('ownerUid').equalTo(uid);
    ref.on('value', snap => {
      const val = snap.val();
      const games = val ? Object.values(val) : [];
      cb(games.sort((a,b) => (b.startedAt||0) - (a.startedAt||0)));
    });
    return () => ref.off();
  },

  // Games — read all (for leaderboard)
  listenAllGames: (cb) => {
    const ref = fbDb.ref('games');
    ref.on('value', snap => {
      const val = snap.val();
      cb(val ? Object.values(val) : []);
    });
    return () => ref.off();
  },

  // Playlists — shared globally
  listenPlaylists: (cb) => {
    const ref = fbDb.ref('playlists');
    ref.on('value', snap => {
      const val = snap.val();
      cb(val ? Object.values(val) : []);
    });
    return () => ref.off();
  },
  savePlaylist: (pl) => {
    // Firebase rejects objects with null values — strip url if not set
    const data = { id:pl.id, name:pl.name };
    if (pl.url) data.url = pl.url;
    return fbDb.ref(`playlists/${pl.id}`).set(data);
  },
  deletePlaylist: (id) => fbDb.ref(`playlists/${id}`).remove(),

  // Games — delete
  deleteGame: (gameId) => fbDb.ref(`games/${gameId}`).remove(),

  // Shares
  saveShare: (code, data) => fbDb.ref(`shares/${code}`).set(data),
  getShare:  (code)       => fbDb.ref(`shares/${code}`).get().then(s => s.val()),
};
// ─── Spotify integration (PKCE, no backend needed) ───────────────────────────
const SPOTIFY = {
  CLIENT_ID: "2d460cd102fc4ce9bf4ea4e97b1831eb",
  get REDIRECT_URI() { return window.location.origin + window.location.pathname; },
  // v2: added playlist-read-private and playlist-read-collaborative
  SCOPES_VERSION: "v2",
  SCOPES: ["streaming","user-read-email","user-read-private",
           "user-read-playback-state","user-modify-playback-state",
           "user-read-currently-playing",
           "playlist-read-private","playlist-read-collaborative",
           "playlist-read-public"].join(" "),
  AUTH_URL:  "https://accounts.spotify.com/authorize",
  TOKEN_URL: "https://accounts.spotify.com/api/token",
};
console.log("[Spotify] Redirect URI:", SPOTIFY.REDIRECT_URI);

// Stub for the Spotify SDK callback — the useSpotify hook replaces this with
// the real player builder once React has mounted. If the SDK loads before the
// hook runs, it calls this stub which queues the init for when the hook is ready.
window._spotifySDKReady = false;
window.onSpotifyWebPlaybackSDKReady = function() {
  window._spotifySDKReady = true;
};

// Clear any token that was issued with an old/different scope set
spotifyTokens.checkVersion();

function spotifyRandomString(length) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join("");
}
async function spotifySha256(plain) {
  return await crypto.subtle.digest("SHA-256", new TextEncoder().encode(plain));
}
function spotifyBase64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

const spotifyTokens = {
  get access()  { try { return JSON.parse(sessionStorage.getItem("sp_tokens"))?.access_token || null; } catch { return null; } },
  get refresh() { try { return JSON.parse(sessionStorage.getItem("sp_tokens"))?.refresh_token || null; } catch { return null; } },
  get expiry()  { try { return JSON.parse(sessionStorage.getItem("sp_tokens"))?.expires_at || 0; } catch { return 0; } },
  save(data) {
    const stored = { access_token: data.access_token,
      refresh_token: data.refresh_token || this.refresh,
      expires_at: Date.now() + (data.expires_in * 1000) - 60000,
      scopes_version: SPOTIFY.SCOPES_VERSION };
    sessionStorage.setItem("sp_tokens", JSON.stringify(stored));
  },
  clear() { sessionStorage.removeItem("sp_tokens"); },
  // Call on startup — clears token if it was issued with an older scope set
  checkVersion() {
    try {
      const stored = JSON.parse(sessionStorage.getItem("sp_tokens"));
      if (stored && stored.scopes_version !== SPOTIFY.SCOPES_VERSION) {
        console.log("[Spotify] Scope version changed, clearing old token");
        this.clear();
      }
    } catch { this.clear(); }
  },
};

async function spotifyLogin(returnScreen) {
  const verifier  = spotifyRandomString(64);
  const challenge = spotifyBase64url(await spotifySha256(verifier));
  sessionStorage.setItem("sp_verifier", verifier);
  sessionStorage.setItem("sp_return_screen", returnScreen || "home");
  const params = new URLSearchParams({
    client_id: SPOTIFY.CLIENT_ID, response_type: "code",
    redirect_uri: SPOTIFY.REDIRECT_URI, scope: SPOTIFY.SCOPES,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  window.location.href = SPOTIFY.AUTH_URL + "?" + params.toString();
}

async function spotifyHandleRedirect() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  if (params.get("error")) { window.history.replaceState({}, document.title, SPOTIFY.REDIRECT_URI); return false; }
  if (!code) return false;
  const verifier = sessionStorage.getItem("sp_verifier");
  if (!verifier) return false;
  const body = new URLSearchParams({ client_id: SPOTIFY.CLIENT_ID,
    grant_type: "authorization_code", code,
    redirect_uri: SPOTIFY.REDIRECT_URI, code_verifier: verifier });
  try {
    const res = await fetch(SPOTIFY.TOKEN_URL, { method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"}, body });
    const data = await res.json();
    if (data.access_token) { spotifyTokens.save(data); sessionStorage.removeItem("sp_verifier"); }
  } catch(e) { console.error("[Spotify] Token exchange failed:", e); }
  window.history.replaceState({}, document.title, SPOTIFY.REDIRECT_URI);
  const returnScreen = sessionStorage.getItem("sp_return_screen") || "home";
  sessionStorage.removeItem("sp_return_screen");
  return returnScreen;
}

async function spotifyRefreshToken() {
  const refresh = spotifyTokens.refresh;
  if (!refresh) return false;
  const body = new URLSearchParams({ client_id: SPOTIFY.CLIENT_ID,
    grant_type: "refresh_token", refresh_token: refresh });
  try {
    const res = await fetch(SPOTIFY.TOKEN_URL, { method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"}, body });
    const data = await res.json();
    if (data.access_token) { spotifyTokens.save(data); return true; }
  } catch(e) { console.error("[Spotify] Refresh failed:", e); }
  return false;
}

async function spotifyValidToken() {
  if (!spotifyTokens.access) return null;
  if (Date.now() >= spotifyTokens.expiry) { const ok = await spotifyRefreshToken(); if (!ok) return null; }
  return spotifyTokens.access;
}

async function spotifyApi(path, method, bodyObj) {
  method = method || "GET";
  const token = await spotifyValidToken();
  if (!token) throw new Error("not_authenticated");
  const opts = { method, headers: { Authorization: "Bearer " + token } };
  if (bodyObj !== undefined && bodyObj !== null) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(bodyObj);
  }
  const res = await fetch("https://api.spotify.com/v1" + path, opts);
  if (res.status === 204) return null;
  if (!res.ok) { const txt = await res.text(); throw new Error("spotify_" + res.status + ": " + txt); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ─── Utilities ────────────────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
}
function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h > 0
    ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`
    : `${m}:${String(sec).padStart(2,"0")}`;
}
function fmtPct(n,d) { if (!d) return "—"; return Math.round((n/d)*100)+"%"; }

// ─── Design tokens ────────────────────────────────────────────────────────────
const T = {
  bg:"#0E1117", surface:"#181D27", card:"#1F2737", border:"#2C3444",
  accent:"#F5A623", accentL:"#FFD07A",
  green:"#4ADE80", red:"#F87171", blue:"#60A5FA", purple:"#A78BFA",
  text:"#F1F5F9", muted:"#8B99B0", dq:"#374151",
};
const PC = ["#F5A623","#60A5FA","#4ADE80","#F87171","#A78BFA","#FB923C","#34D399","#F472B6"];

// ─── Base components ──────────────────────────────────────────────────────────
function Btn({ children, onClick, variant="primary", disabled, style={}, small }) {
  const base = {
    display:"inline-flex", alignItems:"center", justifyContent:"center", gap:6,
    fontWeight:600, borderRadius:10, transition:"opacity .1s",
    fontSize: small ? 13 : 15, padding: small ? "6px 14px" : "11px 20px",
    opacity: disabled ? .4 : 1, cursor: disabled ? "not-allowed" : "pointer",
  };
  const V = {
    primary:   { background:T.accent, color:"#0E1117" },
    secondary: { background:T.card, color:T.text, border:`1px solid ${T.border}` },
    ghost:     { background:"transparent", color:T.muted, border:`1px solid ${T.border}` },
    danger:    { background:"#7F1D1D", color:"#FCA5A5", border:"1px solid #991B1B" },
    success:   { background:"#14532D", color:T.green, border:"1px solid #166534" },
  };
  return <button onClick={disabled ? undefined : onClick} style={{...base,...V[variant],...style}}>{children}</button>;
}

function Card({ children, style={} }) {
  return <div style={{ background:T.card, borderRadius:14, border:`1px solid ${T.border}`, padding:16, ...style }}>{children}</div>;
}

function Lbl({ children, style={} }) {
  return <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:T.muted, marginBottom:6, ...style }}>{children}</div>;
}

function TInput({ value, onChange, placeholder, style={}, type="text" }) {
  return <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
    style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 12px",
      color:T.text, fontSize:15, width:"100%", outline:"none", ...style }} />;
}

function Toggle({ value, onChange }) {
  return (
    <div onClick={() => onChange(!value)} style={{ width:44, height:24, borderRadius:12,
      background: value ? T.accent : T.border, position:"relative", transition:"background .2s", cursor:"pointer", flexShrink:0 }}>
      <div style={{ position:"absolute", top:2, left: value ? 22 : 2, width:20, height:20,
        borderRadius:"50%", background: value ? "#0E1117" : T.muted, transition:"left .2s" }} />
    </div>

}

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:1000,
      display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
      <div onClick={e => e.stopPropagation()} style={{ background:T.surface, borderRadius:"20px 20px 0 0",
        width:"100%", maxWidth:500, maxHeight:"90vh", overflow:"auto", padding:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ color:T.text, fontWeight:700, fontSize:17 }}>{title}</span>
          <Btn variant="ghost" small onClick={onClose}>✕</Btn>
        </div>
        {children}
      </div>
    </div>

}

function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{ display:"flex", gap:4, background:T.surface, borderRadius:10, padding:4 }}>
      {tabs.map(t => (
        <button key={t.value} onClick={() => onChange(t.value)}
          style={{ flex:1, padding:"8px 4px", borderRadius:8, border:"none", fontSize:12, fontWeight:600,
            background: active===t.value ? T.card : "transparent",
            color: active===t.value ? T.text : T.muted, transition:"all .15s" }}>
          {t.label}
        </button>
      ))}

}

function Sel({ value, onChange, children, style={} }) {
  return (
    <div style={{ position:"relative", ...style }}>
      <select value={value} onChange={e => onChange(e.target.value)}
        style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:8,
          padding:"10px 36px 10px 12px", color: value !== "" ? T.text : T.muted,
          fontSize:14, width:"100%", cursor:"pointer" }}>
        {children}
      </select>
      <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
        color:T.muted, pointerEvents:"none", fontSize:12 }}>▾</span>
    </div>
  );
}

function Spinner({ size=20 }) {
  const spin = `@keyframes spin { to { transform: rotate(360deg); } }`;
  return (
    <>
      <style>{spin}</style>
      <div style={{ width:size, height:size, border:`2px solid ${T.border}`,
        borderTopColor:T.accent, borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
    </>
  );
}

function PlaylistLink({ url, style={} }) {
  if (!url) return null;
  let label = "Open playlist ↗";
  try {
    const h = new URL(url).hostname.toLowerCase();
    if (h.includes("spotify"))    label = "🟢 Open in Spotify ↗";
    else if (h.includes("apple")) label = "🎵 Open in Apple Music ↗";
    else if (h.includes("youtube") || h.includes("youtu.be")) label = "▶️ Open on YouTube ↗";
    else if (h.includes("tidal")) label = "💠 Open in Tidal ↗";
    else if (h.includes("deezer")) label = "🎶 Open in Deezer ↗";
  } catch {}
  return (
    <a href={url} target="_blank" rel="noopener noreferrer"
      style={{ display:"inline-flex", alignItems:"center", gap:4,
        fontSize:12, color:T.blue, textDecoration:"none", fontWeight:600, ...style }}>
      {label}
    </a>
  );
}

// ─── Timer hook ───────────────────────────────────────────────────────────────
function useTimer(init=0) {
  const [secs, setSecs]       = useState(init);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => setSecs(s => s+1), 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const startRef  = useRef(() => setRunning(true));
  const pauseRef  = useRef(() => setRunning(false));
  const toggleRef = useRef(() => setRunning(r => !r));

  return { secs, running, start:startRef.current, pause:pauseRef.current, toggle:toggleRef.current };
}


// ─── Spotify hook ─────────────────────────────────────────────────────────────
function useSpotify(ready) {
  const [status, setStatus]   = useState("disconnected");
  const [track, setTrack]     = useState(null);
  const [deviceId, setDeviceId] = useState(null);
  const [profile, setProfile] = useState(null);
  const playerRef = useRef(null);

  useEffect(function() {
    if (!ready) return;
    if (!spotifyTokens.access) { setStatus("disconnected"); return; }
    setStatus("connecting");
    var cancelled = false;

    async function init() {
      try {
        var me = await spotifyApi("/me");
        if (cancelled) return;
        setProfile(me);
        if (me.product !== "premium") { setStatus("no-premium"); return; }
      } catch(e) { if (!cancelled) setStatus("disconnected"); return; }

      function buildPlayer() {
        if (cancelled || !window.Spotify) return;
        var player = new window.Spotify.Player({
          name: "Song Game",
          getOAuthToken: async function(cb) { var t = await spotifyValidToken(); cb(t); },
          volume: 0.8,
        });
        playerRef.current = player;
        player.addListener("ready", function(x) { if (!cancelled) { setDeviceId(x.device_id); setStatus("connected"); } });
        player.addListener("not_ready", function() { if (!cancelled) setDeviceId(null); });
        player.addListener("player_state_changed", function(state) {
          if (cancelled || !state) return;
          var t = state.track_window && state.track_window.current_track;
          if (t) setTrack({ name:t.name, artist:(t.artists||[]).map(function(a){return a.name;}).join(", "),
            album:t.album && t.album.name, art:(t.album && t.album.images && t.album.images[0] && t.album.images[0].url)||null,
            paused:state.paused });
        });
        player.addListener("authentication_error", function() { if (!cancelled) setStatus("disconnected"); });
        player.addListener("account_error", function() { if (!cancelled) setStatus("no-premium"); });
        player.connect();
      }
      if (window.Spotify && window._spotifySDKReady) {
        // SDK already loaded and fired its callback — build immediately
        buildPlayer();
      } else {
        // SDK not ready yet — our stub will have set _spotifySDKReady=true when it fires.
        // Replace the stub with the real builder so the SDK triggers it directly.
        window.onSpotifyWebPlaybackSDKReady = buildPlayer;
      }
    }

    init();
    return function() {
      cancelled = true;
      if (playerRef.current) { playerRef.current.disconnect(); playerRef.current = null; }
    };
  }, [ready]);

  async function playPlaylist(playlistUrl) {
    var m = (playlistUrl||"").match(/playlist[/:]([A-Za-z0-9]+)/);
    if (!m) return false;
    var playlistId = m[1];
    try {
      var uris = [];
      var offset = 0;
      var LIMIT = 100;
      while (true) {
        var page = await spotifyApi("/playlists/" + playlistId + "/tracks?limit=" + LIMIT + "&offset=" + offset);
        if (!page || !page.items || !page.items.length) break;
        page.items.forEach(function(item) {
          if (item && item.track && item.track.uri && !item.track.is_local &&
              item.track.uri.indexOf("spotify:track:") === 0) uris.push(item.track.uri);
        });
        if (page.items.length < LIMIT) break;
        offset += LIMIT;
      }
      if (!uris.length) { console.warn("[Spotify] No playable tracks"); return false; }
      console.log("[Spotify] Fetched " + uris.length + " tracks");
      for (var i = uris.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = uris[i]; uris[i] = uris[j]; uris[j] = tmp;
      }
      if (uris.length > 750) uris = uris.slice(0, 750);
      if (deviceId) {
        await spotifyApi("/me/player/play?device_id=" + deviceId, "PUT", {}).catch(function(){});
        await new Promise(function(r) { setTimeout(r, 300); });
      }
      var playPath = deviceId ? "/me/player/play?device_id=" + deviceId : "/me/player/play";
      await spotifyApi(playPath, "PUT", { uris: uris });
      await spotifyApi("/me/player/shuffle?state=false" + (deviceId ? "&device_id=" + deviceId : ""), "PUT").catch(function(){});
      console.log("[Spotify] Playing shuffled playlist");
      return true;
    } catch(e) { console.error("[Spotify] playPlaylist failed:", e); return false; }
  }

  async function togglePlay() {
    if (playerRef.current) { playerRef.current.togglePlay(); return; }
    try {
      var state = await spotifyApi("/me/player");
      if (state && state.is_playing) await spotifyApi("/me/player/pause", "PUT");
      else await spotifyApi("/me/player/play", "PUT");
    } catch(e) { console.error(e); }
  }
  async function pause() {
    if (playerRef.current) { await playerRef.current.pause(); return; }
    try { await spotifyApi("/me/player/pause", "PUT"); } catch(e) { console.error(e); }
  }
  async function next() {
    if (playerRef.current) { playerRef.current.nextTrack(); return; }
    try { await spotifyApi("/me/player/next", "POST"); } catch(e) { console.error(e); }
  }
  async function previous() {
    if (playerRef.current) { playerRef.current.previousTrack(); return; }
    try { await spotifyApi("/me/player/previous", "POST"); } catch(e) { console.error(e); }
  }
  function disconnect() {
    if (playerRef.current) { playerRef.current.disconnect(); playerRef.current = null; }
    spotifyTokens.clear();
    setStatus("disconnected"); setTrack(null); setDeviceId(null); setProfile(null);
  }

  return { status, track, profile, deviceId, login:spotifyLogin, disconnect,
           playPlaylist, togglePlay, pause, next, previous };
}

// ─── Score computation ────────────────────────────────────────────────────────
function computeScores(players, songs, mode) {
  const stats = {};
  players.forEach(p => {
    stats[p.id] = { id:p.id, name:p.name, correct:0, incorrect:0, title:[0,0], artist:[0,0], album:[0,0] };
  });
  const hostId = players[0]?.id;
  (songs||[]).filter(s => !s.skipped).forEach(song => {
    ["title","artist","album"].forEach(cat => {
      const r = song[cat];
      if (!r) return;
      if (r.type === "null") {
        // "Said in song" = 0.5 wrong; "N/A" (no_category) = not counted at all
        if (r.reason === "said_in_song") {
          if (mode === "solo" && stats[hostId]) {
            // Host always charged 0.5 for said-in-song
            stats[hostId].incorrect += 0.5;
          } else if (r.incorrects) {
            Object.entries(r.incorrects).forEach(([pid,v]) => {
              if (stats[pid] && v < 0) stats[pid].incorrect += Math.abs(v) * 0.5;
            });
          }
        }
        return;
      }
      if (r.type === "none") {
        if (r.incorrects) Object.entries(r.incorrects).forEach(([pid,v]) => {
          if (stats[pid] && v < 0) stats[pid].incorrect += Math.abs(v);
        });
        return;
      }
      if (r.type === "player") {
        if (stats[r.playerId]) {
          stats[r.playerId].correct++;
          stats[r.playerId][cat][0]++;
          stats[r.playerId][cat][1]++;
        }
        if (r.incorrects) Object.entries(r.incorrects).forEach(([pid,v]) => {
          if (stats[pid] && v < 0) stats[pid].incorrect += Math.abs(v);
        });
      }
    });
  });
  return Object.values(stats);
}

function buildPlayerMap(filteredGames) {
  const pm = {};

  // Helper: get the stable key for a player — accountUid if linked, else name
  function playerKey(p) { return p.accountUid || p.name; }

  filteredGames.forEach(g => {
    const songs = (g.songs||[]).filter(s=>!s.skipped);
    const gameMinutes = (g.elapsedSeconds||0) / 60;
    const scoresByPlayer = computeScores(g.players, g.songs||[], g.mode);

    scoresByPlayer.forEach(s => {
      const playerObj = g.players.find(p=>p.id===s.id);
      const key = playerObj ? playerKey(playerObj) : s.name;
      if (!pm[key]) pm[key] = {
        key,
        name: s.name,
        accountUid: playerObj?.accountUid||null,
        correct: 0, incorrect: 0,
        songsPlayed: 0, minutesPlayed: 0,
        title:[0,0], artist:[0,0], album:[0,0],
        games: [], // per-game records for best/avg
      };
      pm[key].name = s.name;
      pm[key].correct += s.correct;
      pm[key].incorrect += s.incorrect;
      pm[key].songsPlayed += songs.length;
      pm[key].minutesPlayed += gameMinutes;
      pm[key].games.push({
        correct: s.correct,
        incorrect: s.incorrect,
        minutes: gameMinutes,
        songs: songs.length,
        ppm: gameMinutes > 0 ? s.correct / gameMinutes : 0,
        pps: songs.length > 0 ? s.correct / songs.length : 0,
        ratio: s.incorrect > 0 ? s.correct / s.incorrect : s.correct > 0 ? Infinity : 0,
      });
    });

    songs.forEach(song => {
      ["title","artist","album"].forEach(cat => {
        const r = song[cat];
        if (!r || r.type==="null") return;
        g.players.forEach(p => {
          const key = playerKey(p);
          if (pm[key]) pm[key][cat][1]++;
        });
        if (r.type==="player") {
          const p = g.players.find(p=>p.id===r.playerId);
          const key = p ? playerKey(p) : null;
          if (key && pm[key]) pm[key][cat][0]++;
        }
      });
    });
  });

  // Compute derived stats for each player
  Object.values(pm).forEach(p => {
    const qualifiedGames = p.games.filter(g => g.minutes >= 10);
    p.bestGame = qualifiedGames.length > 0
      ? qualifiedGames.reduce((best, g) => g.correct > best.correct ? g : best)
      : null;
    const gc = p.games.length;
    p.avgCorrect   = gc > 0 ? p.correct / gc : 0;
    p.avgIncorrect = gc > 0 ? p.incorrect / gc : 0;
    p.avgPpm       = gc > 0 ? p.games.reduce((a,g)=>a+g.ppm,0) / gc : 0;
    p.avgPps       = gc > 0 ? p.games.reduce((a,g)=>a+g.pps,0) / gc : 0;
    p.avgRatio     = gc > 0 ? p.games.filter(g=>isFinite(g.ratio)).reduce((a,g,_,arr)=>a+g.ratio/arr.length,0) : 0;
    p.gameCount    = gc;
    // Overall (all-time) derived metrics
    p.overallPpm   = p.minutesPlayed > 0 ? p.correct / p.minutesPlayed : 0;
    p.overallPps   = p.songsPlayed   > 0 ? p.correct / p.songsPlayed   : 0;
    p.overallRatio = p.incorrect > 0 ? p.correct / p.incorrect : p.correct > 0 ? Infinity : 0;
  });

  return pm;
}

function buildPlaylistMap(allGames, allPlaylists) {
  const pl = {};
  allGames.filter(g=>g.playlist).forEach(g => {
    if (!pl[g.playlist]) pl[g.playlist] = { name:g.playlist, games:[] };
    pl[g.playlist].games.push(g);
  });
  Object.values(pl).forEach(p => {
    const plObj = (allPlaylists||[]).find(x=>x.name===p.name);
    p.url = plObj?.url || p.games.find(g=>g.playlistUrl)?.playlistUrl || null;
    const songs = p.games.flatMap(g=>(g.songs||[]).filter(s=>!s.skipped));
    p.totalSongs = songs.length;
    p.totalMinutes = p.games.reduce((a,g)=>a+(g.elapsedSeconds||0)/60,0);
    p.totalGames = p.games.length;
    p.cats = {};
    ["title","artist","album"].forEach(cat => {
      p.cats[cat] = [
        songs.filter(s=>s[cat]?.type==="player").length,
        songs.filter(s=>s[cat] && s[cat].type!=="null").length,
      ];
    });
    p.playerMap = buildPlayerMap(p.games);
  });
  return pl;
}

function PlayerInput({ value, onChange, placeholder, color, onRemove, currentUserUid }) {
  const [suggestions, setSuggestions] = useState([]);
  const [showDrop, setShowDrop]       = useState(false);
  const debounceRef = useRef(null);

  function handleChange(text) {
    onChange({ name: text, accountUid: null }); // clear link when typing
    setShowDrop(false);
    clearTimeout(debounceRef.current);
    if (text.trim().length < 2) { setSuggestions([]); return; }
    debounceRef.current = setTimeout(async () => {
      const results = await db.searchUsers(text);
      // Don't suggest the current signed-in user — they're already slot 0
      const filtered = results.filter(u => u.uid !== currentUserUid);
      setSuggestions(filtered);
      setShowDrop(filtered.length > 0);
    }, 300);
  }

  function pickSuggestion(u) {
    onChange({ name: u.displayName, accountUid: u.uid });
    setSuggestions([]);
    setShowDrop(false);
  }

  return (
    <div style={{ position:"relative", flex:1 }}>
      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
        <TInput
          value={value.name}
          onChange={text => handleChange(text)}

function SetupScreen({ playlists, onStart, onBack, user }) {
  // Each player: { name: string, accountUid: string|null }
  // First slot is always pre-linked to the signed-in host
  const [mode, setMode]           = useState("solo");
  const [players, setPlayers]     = useState([
    { name: user.displayName, accountUid: user.uid },
    { name: "", accountUid: null },
  ]);
  const [albumEnabled, setAlbumEnabled] = useState(false);
  const [selPl, setSelPl]         = useState("");
  const [newPl, setNewPl]         = useState("");
  const [newPlUrl, setNewPlUrl]   = useState("");
  const [showNewPl, setShowNewPl] = useState(false);

  const canStart = mode==="solo"
    ? players[0].name.trim()
    : players.filter(p=>p.name.trim()).length >= 2;
  const selPlObj = selPl ? playlists.find(p => p.name === selPl) : null;

  function updatePlayer(i, val) {
    setPlayers(players.map((p,j) => j===i ? val : p));
  }

  function removePlayer(i) {
    setPlayers(players.filter((_,j) => j!==i));
  }

  function addPlayer() {
    setPlayers([...players, { name:"", accountUid:null }]);
  }

  function handleStart() {
    const named = players
      .filter(p => p.name.trim())
      .map(p => ({
        id: uid(),
        name: p.name.trim(),
        ...(p.accountUid ? { accountUid: p.accountUid } : {}),
      }));
    const playlistUrl = selPlObj?.url || (showNewPl ? newPlUrl.trim() : "") || null;
    onStart({ mode, players:named, albumEnabled, playlist: selPl || newPl.trim() || null, playlistUrl });
  }

  return (
    <div style={{ padding:20, maxWidth:460, margin:"0 auto", paddingBottom:40 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <h2 style={{ color:T.text, fontWeight:800, fontSize:20 }}>New Game</h2>
      </div>

      <Card style={{ marginBottom:12 }}>
        <Lbl>Game mode</Lbl>
        <Tabs tabs={[{label:"Solo / Team",value:"solo"},{label:"Multiplayer",value:"multi"}]} active={mode} onChange={setMode} />
      </Card>

      <Card style={{ marginBottom:12 }}>
        <Lbl>{mode==="solo" ? "Player(s)" : "Players"}</Lbl>
        {players.map((p,i) => (
          <div key={i} style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center" }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:PC[i], flexShrink:0, marginTop:2 }} />
            {i === 0 ? (
              // Host slot — name is editable but always linked to signed-in user
              <div style={{ flex:1, display:"flex", alignItems:"center", gap:6 }}>
                <TInput value={p.name}
                  onChange={v => updatePlayer(0, { name:v, accountUid: user.uid })}
                  placeholder="Your name" />
                <span style={{ fontSize:11, color:T.green, fontWeight:700, whiteSpace:"nowrap",
                  background:"#14532D", padding:"3px 8px", borderRadius:20, flexShrink:0 }}>you</span>
              </div>
            ) : (
              <PlayerInput
                value={p}
                onChange={val => updatePlayer(i, val)}
                placeholder={mode==="solo" ? `Player ${i+1}` : `Player ${i+1}`}
                color={PC[i]}
                currentUserUid={user.uid}
              />
            )}
            {(mode==="multi" ? players.length>2 : players.length>1) && i > 0 && (
              <Btn variant="ghost" small onClick={() => removePlayer(i)} style={{ flexShrink:0 }}>✕</Btn>
            )}
          </div>
        ))}
        {players.length < 8 && (
          <Btn variant="ghost" small onClick={addPlayer} style={{ marginTop:4 }}>
            + Add {mode==="solo" ? "team member" : "player"}
          </Btn>
        )}
        {mode==="solo" && players.length>1 && (
          <p style={{ color:T.muted, fontSize:12, marginTop:8 }}>Team mode: stats tracked together & individually</p>
        )}
      </Card>

      <Card style={{ marginBottom:12 }}>
        <Lbl>Playlist</Lbl>
        {playlists.length > 0 && (
          <Sel value={selPl} onChange={v => { setSelPl(v); if(v) setShowNewPl(false); }} style={{ marginBottom:8 }}>
            <option value="">— Select saved playlist —</option>
            {playlists.map(function(pl) {
              var hasSpotify = /open\.spotify\.com\/playlist|spotify:playlist/.test(pl.url||"");
              return <option key={pl.id} value={pl.name}>{(hasSpotify ? "[Spotify] " : "") + pl.name}</option>;
            })}
          </Sel>
        )}
        {selPlObj && selPlObj.url && <div style={{ marginBottom:8 }}><PlaylistLink url={selPlObj.url} /></div>}
        {selPlObj && selPlObj.url && !/open\.spotify\.com\/playlist|spotify:playlist/.test(selPlObj.url) && (
          <div style={{ fontSize:11, color:T.muted, marginBottom:8 }}>Not a Spotify URL - in-app controls won't work</div>
        )}
        {showNewPl ? (
          <div>
            <TInput value={newPl} onChange={setNewPl} placeholder="New playlist name" style={{ marginBottom:8 }} />
            <TInput value={newPlUrl} onChange={setNewPlUrl} placeholder="Playlist URL (optional)" />
          </div>
        ) : (
          <Btn variant="ghost" small onClick={() => { setShowNewPl(true); setSelPl(""); }}>+ New playlist name</Btn>
        )}
      </Card>

      <Card style={{ marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ color:T.text, fontSize:14, fontWeight:600 }}>Album category</div>
            <div style={{ color:T.muted, fontSize:12 }}>Can be toggled per song too</div>
          </div>
          <Toggle value={albumEnabled} onChange={setAlbumEnabled} />
        </div>
      </Card>

      <Btn onClick={handleStart} disabled={!canStart} style={{ width:"100%", padding:14, fontSize:16 }}>
        Start Game →
      </Btn>
    </div>
  );
}

// ─── In-Game ──────────────────────────────────────────────────────────────────
function initEntry(players, albumEnabled) {
  return {
    title:  { guesses:{}, result:null, dqd:{} },
    artist: { guesses:{}, result:null, dqd:{} },
    album:  { guesses:{}, result:null, dqd:{}, enabled:albumEnabled },
  };
}

function GameScreen({ game, onUpdateGame, onEndGame, playlists, sp }) {
  const timer = useTimer(game.elapsedSeconds || 0);
  const [albumOn, setAlbumOn]   = useState(game.albumEnabled);
  const [entry, setEntry]       = useState(() => initEntry(game.players, game.albumEnabled));
  const [showEnd, setShowEnd]   = useState(false);
  const [showScores, setShowScores] = useState(false);
  const [prevSnapshot, setPrevSnapshot] = useState(null); // { game, entry, timerSecs } for undo

  useEffect(() => { timer.start(); }, []);

  function setResult(cat, result) {
    setEntry(prev => ({ ...prev, [cat]: { ...prev[cat], result } }));
  }

  function handleGuess(cat, playerId, correct) {
    if (game.mode === "multi") {
      if (correct) setResult(cat, { type:"player", playerId });
      else setEntry(prev => ({ ...prev, [cat]: { ...prev[cat], dqd:{ ...prev[cat].dqd, [playerId]:true } } }));
    } else {
      if (correct) {
        setEntry(prev => ({
          ...prev,
          [cat]: {
            ...prev[cat],
            result: { type:"player", playerId },
            guesses: { ...prev[cat].guesses, [playerId]: (prev[cat].guesses[playerId] || 0) + 1 },
          }
        }));
      } else {
        setEntry(prev => ({
          ...prev,
          [cat]: {
            ...prev[cat],
            guesses: { ...prev[cat].guesses, [playerId]: (prev[cat].guesses[playerId] || 0) - 1 },
          }
        }));
      }
    }
  }

  function catResult(cat) {
    const s = entry[cat];
    const incorrects = {};
    Object.entries(s.guesses || {}).forEach(([pid, v]) => {
      if (v < 0) incorrects[pid] = v;
    });
    if (s.result?.type==="said_in_song") return { type:"null", reason:"said_in_song", incorrects };
    if (s.result?.type==="no_category")  return { type:"null", reason:"no_category" };
    if (s.result?.type==="player")       return { type:"player", playerId:s.result.playerId, incorrects };
    // Unmarked in solo mode = the player got it wrong by default.
    // Ensure the host player has at least one wrong recorded for this category.
    if (game.mode === "solo") {
      const hostId = game.players[0].id;
      if (!incorrects[hostId]) incorrects[hostId] = -1;
    }
    return { type:"none", incorrects };
  }

  async function submitSong(skipped=false) {
    const elapsed = timer.secs;
    timer.pause();
    // Save snapshot for undo before committing
    setPrevSnapshot({ game: { ...game }, entry: { ...entry }, timerSecs: elapsed });
    const song = {
      id:uid(), timestamp:Date.now(), skipped,
      album_enabled: entry.album.enabled,
      title:  skipped ? null : catResult("title"),
      artist: skipped ? null : catResult("artist"),
      album:  (!entry.album.enabled||skipped) ? null : catResult("album"),
    };
    // Auto-save new playlist to Firebase
    if (game.playlist && !playlists.find(p=>p.name===game.playlist)) {
      const newPl = { id:uid(), name:game.playlist, url:game.playlistUrl||null };
      await db.savePlaylist(newPl);
    }
    const updated = { ...game, elapsedSeconds:elapsed, songs:[...(game.songs||[]), song] };
    onUpdateGame(updated);
    await db.saveGame(updated);
    setEntry(initEntry(game.players, albumOn));
    timer.start();
  }

  async function undoPrevSong() {
    if (!prevSnapshot) return;
    timer.pause();
    // Restore the game state to before the last song was submitted
    const restored = {
      ...prevSnapshot.game,
      elapsedSeconds: prevSnapshot.timerSecs,
    };
    onUpdateGame(restored);
    await db.saveGame(restored);
    setEntry(prevSnapshot.entry);
    setPrevSnapshot(null);
    timer.start();
  }

  const [countdown, setCountdown] = useState(null);

  function handleGotAll() {
    const pid = game.players[0].id;
    const activeCats = ["title","artist",...(entry.album.enabled?["album"]:[])];
    setEntry(prev => {
      const next = { ...prev };
      activeCats.forEach(cat => {
        if (!prev[cat].result || prev[cat].result.type === "player") {
          next[cat] = { ...prev[cat], result: { type:"player", playerId:pid } };
        }
      });
      return next;
    });
    setPrevSnapshot(null); // can't undo once countdown starts
    setCountdown(3);
  }

  const submitSongRef = useRef(submitSong);
  submitSongRef.current = submitSong;

  useEffect(() => {
    if (countdown === null) return;
    if (countdown === 0) { setCountdown(null); submitSongRef.current(false); return; }
    const t = setTimeout(() => setCountdown(c => c-1), 1000);
    return () => clearTimeout(t);
  }, [countdown]);

  async function endGame(stopMusic) {
    if (stopMusic && sp && sp.status === "connected") {
      await sp.pause().catch(function(){});
    }
    const final = { ...game, elapsedSeconds:timer.secs, endedAt:Date.now(), status:"complete" };
    await db.saveGame(final);
    onEndGame(final);
  }

  const cats = ["title","artist",...(entry.album.enabled?["album"]:[])];
  const catLabels = { title:"Song Title 🎵", artist:"Artist 🎤", album:"Album 💿" };
  const scores = computeScores(game.players, game.songs||[], game.mode);
  const songCount = (game.songs||[]).filter(s=>!s.skipped).length;

  return (
    <div style={{ padding:16, maxWidth:460, margin:"0 auto", paddingBottom:100 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div>
          <div style={{ color:T.accent, fontSize:24, fontWeight:800, letterSpacing:"-0.02em" }}>{fmtTime(timer.secs)}</div>
          <div style={{ color:T.muted, fontSize:12 }}>Song {songCount + 1}</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn variant="secondary" small onClick={timer.toggle}>{timer.running ? "⏸" : "▶"}</Btn>
          <Btn variant="secondary" small onClick={() => setShowScores(true)}>📊</Btn>
          <Btn variant="danger" small onClick={() => setShowEnd(true)}>End</Btn>
        </div>
      </div>

      {sp && <SpotifyBar sp={sp} playlistUrl={game.playlistUrl} returnScreen="game" />}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
        background:T.surface, borderRadius:10, padding:"10px 14px", marginBottom:14 }}>
        <span style={{ color:T.muted, fontSize:13 }}>Album category</span>
        <Toggle value={albumOn} onChange={v => { setAlbumOn(v); setEntry(prev=>({...prev,album:{...prev.album,enabled:v}})); }} />
      </div>

      {cats.map(cat => (
        <CatPanel key={cat} cat={cat} label={catLabels[cat]}
          entry={entry[cat]} players={game.players} mode={game.mode}
          onGuess={(pid,correct) => handleGuess(cat,pid,correct)}
          onSetResult={r => setResult(cat,r)} />
      ))}

      {game.mode === "solo" ? (
        <div style={{ marginTop:8 }}>
          {countdown !== null ? (
            <div style={{ background:T.surface, border:`1px solid ${T.accent}`, borderRadius:12,
              padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ color:T.accent, fontWeight:800, fontSize:18 }}>Next song in {countdown}…</div>
                <div style={{ color:T.muted, fontSize:12, marginTop:2 }}>Tap cancel to go back</div>
              </div>
              <Btn variant="ghost" onClick={() => setCountdown(null)}>Cancel</Btn>
            </div>
          ) : (
            <React.Fragment>
              <div style={{ display:"flex", gap:10, marginBottom:10 }}>
                <Btn variant="success" onClick={handleGotAll} style={{ flex:1 }}>⚡ Got All →3s</Btn>
                <Btn variant="primary" onClick={() => submitSong(false)} style={{ flex:1 }}>Next Song →</Btn>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <Btn variant="ghost" onClick={() => submitSong(true)}
                  style={{ flex:1, fontSize:12, padding:"8px", opacity:0.6 }}>
                  Skip song
                </Btn>
                {prevSnapshot && (
                  <Btn variant="ghost" onClick={undoPrevSong}
                    style={{ flex:1, fontSize:12, padding:"8px", color:T.accent, borderColor:T.accent }}>
                    ← Prev Song
                  </Btn>
                )}
              </div>
            </React.Fragment>
          )}
        </div>
      ) : (
        <div style={{ marginTop:8 }}>
          <div style={{ display:"flex", gap:10, marginBottom:8 }}>
            <Btn variant="ghost" onClick={() => submitSong(true)} style={{ flex:1 }}>Skip Song</Btn>
            <Btn variant="primary" onClick={() => submitSong(false)} style={{ flex:2 }}>Next Song →</Btn>
          </div>
          {prevSnapshot && (
            <Btn variant="ghost" onClick={undoPrevSong}
              style={{ width:"100%", fontSize:12, padding:"8px", color:T.accent, borderColor:T.accent }}>
              ← Undo Previous Song
            </Btn>
          )}
        </div>
      )}

      <Modal open={showEnd} onClose={() => setShowEnd(false)} title="End Game?">
        <p style={{ color:T.muted, fontSize:14, marginBottom:16 }}>This will save the game and show the final summary.</p>
        {sp && sp.status === "connected" && sp.track && !sp.track.paused ? (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <Btn variant="danger" onClick={() => { setShowEnd(false); endGame(true); }} style={{ width:"100%" }}>End Game + Stop Music</Btn>
            <Btn variant="secondary" onClick={() => { setShowEnd(false); endGame(false); }} style={{ width:"100%" }}>End Game, Keep Music Playing</Btn>
            <Btn variant="ghost" onClick={() => setShowEnd(false)} style={{ width:"100%" }}>Cancel</Btn>
          </div>
        ) : (
          <div style={{ display:"flex", gap:10 }}>
            <Btn variant="ghost" onClick={() => setShowEnd(false)} style={{ flex:1 }}>Cancel</Btn>
            <Btn variant="danger" onClick={() => { setShowEnd(false); endGame(false); }} style={{ flex:1 }}>End Game</Btn>
          </div>
        )}
      </Modal>

      <Modal open={showScores} onClose={() => setShowScores(false)} title="Live Scores">
        <ScoreTable scores={scores} players={game.players} mode={game.mode} />
      </Modal>
    </div>
  );
}

function CatPanel({ cat, label, entry, players, mode, onGuess, onSetResult }) {
  const isCorrect = entry.result?.type === "player";
  const isNull    = entry.result?.type === "said_in_song" || entry.result?.type === "no_category";
  const pid       = players[0]?.id;
  const wrongCount = mode === "solo" ? Math.abs(Math.min(0, entry.guesses?.[pid] || 0)) : 0;

  return (
    <Card style={{ marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <span style={{ color:T.text, fontWeight:700, fontSize:15 }}>{label}</span>
        {isCorrect && <span style={{ fontSize:11, color:T.green, fontWeight:700, background:"#14532D", padding:"2px 8px", borderRadius:20 }}>✓ Got it</span>}
        {isNull && entry.result?.type==="said_in_song" && <span style={{ fontSize:11, color:T.purple, fontWeight:700, background:`${T.purple}22`, padding:"2px 8px", borderRadius:20 }}>Said in song</span>}
        {isNull && entry.result?.type==="no_category"  && <span style={{ fontSize:11, color:T.muted, fontWeight:700, background:T.surface, padding:"2px 8px", borderRadius:20 }}>N/A</span>}
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
        {[{key:"said_in_song",label:"Said in song",color:T.purple},{key:"no_category",label:"N/A",color:T.muted}].map(opt => (
          <button key={opt.key}
            onClick={() => onSetResult(entry.result?.type===opt.key ? null : { type:opt.key })}
            style={{ padding:"5px 12px", borderRadius:20, border:`1px solid ${T.border}`, fontSize:12, fontWeight:600, cursor:"pointer",
              background: entry.result?.type===opt.key ? opt.color : T.surface,
              color: entry.result?.type===opt.key ? "#fff" : T.muted }}>
            {opt.label}
          </button>
        ))}
      </div>

      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
        {players.map((p,i) => {
          const dqd   = entry.dqd?.[p.id];
          const color = PC[i];

          if (mode === "multi") {
            return (
              <div key={p.id}>
                <button disabled={dqd} onClick={() => !dqd && onGuess(p.id,true)}
                  style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${dqd?T.dq:color}`,
                    fontSize:13, fontWeight:700, background: dqd?T.dq:`${color}22`,
                    color: dqd?T.muted:color, textDecoration: dqd?"line-through":"none", cursor:dqd?"not-allowed":"pointer" }}>
                  {p.name}
                </button>
              </div>
            );
          }

          const xActive = !isCorrect && !isNull;
          const xDimmed = isCorrect || isNull;

          return (
            <React.Fragment key={p.id}>
              <button
                onClick={() => {
                  if (isCorrect) { onSetResult(null); onGuess(p.id, false); }
                  else { onGuess(p.id, false); }
                }}
                style={{ padding:"8px 14px", borderRadius:"8px 0 0 8px",
                  border:`1px solid ${xActive ? T.red : T.border}`,
                  background: xActive ? `${T.red}33` : T.surface,
                  color: xActive ? T.red : T.muted,
                  fontSize:13, fontWeight:700, cursor:"pointer",
                  opacity: xDimmed ? 0.45 : 1, transition:"opacity .15s, background .15s" }}>
                ✗ {wrongCount > 0 && <span style={{ fontSize:11, marginLeft:2 }}>×{wrongCount}</span>}
              </button>
              <button
                onClick={() => onGuess(p.id, true)}
                style={{ padding:"8px 16px", borderRadius:"0 8px 8px 0",
                  border:`1px solid ${isCorrect ? color : T.border}`,
                  background: isCorrect ? `${color}33` : T.surface,
                  color: isCorrect ? color : T.muted,
                  fontSize:13, fontWeight:700, cursor:"pointer", transition:"background .15s" }}>
                {p.name} ✓
              </button>
            </React.Fragment>
          );
        })}
      </div>
    </Card>
  );
}

function ScoreTable({ scores, players, mode }) {
  return (
    <div>
      {[...scores].sort((a,b)=>b.correct-a.correct).map((s,i) => {
        const pIdx  = players.findIndex(p=>p.name===s.name);
        const color = PC[pIdx >= 0 ? pIdx % PC.length : i % PC.length];
        return (
          <div key={s.name} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:"10px 0", borderBottom: i<scores.length-1?`1px solid ${T.border}`:"none" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center",
                justifyContent:"center", background:color, color:"#0E1117", fontWeight:800, fontSize:12 }}>
                {s.name[0]?.toUpperCase()}
              </div>
              <span style={{ color:T.text, fontWeight:600 }}>{s.name}</span>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ color:T.accent, fontWeight:800, fontSize:18 }}>{s.correct}</div>
              {mode==="solo" && s.incorrect>0 && <div style={{ color:T.red, fontSize:11 }}>-{Number.isInteger(s.incorrect) ? s.incorrect : s.incorrect.toFixed(1)} ✗</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Summary ──────────────────────────────────────────────────────────────────
function SummaryScreen({ game, onHome }) {
  const songs  = (game.songs||[]).filter(s=>!s.skipped);
  const scores = [...computeScores(game.players, game.songs||[], game.mode)].sort((a,b)=>b.correct-a.correct);
  return (
    <div style={{ padding:20, maxWidth:460, margin:"0 auto" }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <div style={{ fontSize:44, marginBottom:8 }}>🎉</div>
        <h2 style={{ color:T.text, fontSize:22, fontWeight:800 }}>Game Over!</h2>
        <div style={{ color:T.muted, fontSize:13, marginTop:4 }}>
          {songs.length} songs · {fmtTime(game.elapsedSeconds||0)}{game.playlist && ` · ${game.playlist}`}
        </div>
        {game.playlistUrl && <div style={{ marginTop:6 }}><PlaylistLink url={game.playlistUrl} /></div>}
      </div>

      <Card style={{ marginBottom:14 }}>
        <Lbl>Final Scores</Lbl>
        {scores.map((s,i) => (
          <div key={s.name} style={{ display:"flex", alignItems:"center", gap:12,
            padding:"10px 0", borderBottom: i<scores.length-1?`1px solid ${T.border}`:"none" }}>
            <span style={{ color:i===0?T.accent:T.muted, fontSize:18, width:24 }}>
              {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}
            </span>
            <span style={{ color:T.text, fontWeight:700, flex:1 }}>{s.name}</span>
            <div style={{ textAlign:"right" }}>
              <span style={{ color:T.accent, fontWeight:800, fontSize:20 }}>{s.correct}</span>
              {game.mode==="solo" && s.incorrect>0 && <span style={{ color:T.red, fontSize:12, marginLeft:6 }}>-{Number.isInteger(s.incorrect) ? s.incorrect : s.incorrect.toFixed(1)}</span>}
            </div>
          </div>
        ))}
      </Card>

      <Card style={{ marginBottom:20 }}>
        <Lbl>Category breakdown</Lbl>
        {["title","artist","album"].filter(c=>c!=="album"||game.albumEnabled).map(cat => {
          const possible = songs.filter(s=>s[cat] && s[cat].type!=="null").length;
          const scored   = songs.filter(s=>s[cat]?.type==="player").length;
          return (
            <div key={cat} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${T.border}` }}>
              <span style={{ color:T.muted, textTransform:"capitalize" }}>{cat}</span>
              <span style={{ color:T.text }}>{fmtPct(scored,possible)} ({scored}/{possible})</span>
            </div>
          );
        })}
      </Card>

      <Btn onClick={onHome} style={{ width:"100%", padding:14, fontSize:16 }}>Back to Home</Btn>
    </div>
  );
}

// ─── Scoreboard ───────────────────────────────────────────────────────────────
function ScoreboardScreen({ allGames, playlists, onBack }) {
  const [tab, setTab]           = useState("rankings");
  const [sortBy, setSortBy]     = useState("avg_pts");  // avg_pts | avg_ppm | avg_ratio | best_pts | best_ppm | best_ratio
  const [sortDir, setSortDir]   = useState("desc");
  const [fMode, setFMode]       = useState("all");
  const [fPl, setFPl]           = useState("all");
  const [detailP, setDetailP]   = useState(null);
  const [detailPl, setDetailPl] = useState(null);

  const allPl    = [...new Set(allGames.filter(g=>g.playlist).map(g=>g.playlist))];
  const filtered = allGames.filter(g => (fMode==="all"||g.mode===fMode) && (fPl==="all"||g.playlist===fPl));
  const playerMap   = buildPlayerMap(filtered);
  const playlistMap = buildPlaylistMap(allGames, playlists);

  const sorted = [...Object.values(playerMap)].sort((a,b) => {
    let va, vb;
    switch(sortBy) {
      case "avg_pts":   va=a.avgCorrect;  vb=b.avgCorrect;  break;
      case "avg_ppm":   va=a.avgPpm;      vb=b.avgPpm;      break;
      case "avg_ratio": va=a.avgRatio;    vb=b.avgRatio;    break;
      case "best_pts":  va=a.bestGame?.correct??-1;  vb=b.bestGame?.correct??-1;  break;
      case "best_ppm":  va=a.bestGame?.ppm??-1;      vb=b.bestGame?.ppm??-1;      break;
      case "best_ratio":va=a.bestGame?.ratio??-1;    vb=b.bestGame?.ratio??-1;    break;
      default:          va=a.avgCorrect;  vb=b.avgCorrect;
    }
    return sortDir==="desc" ? vb-va : va-vb;
  }).slice(0,10);

  return (
    <div style={{ padding:16, maxWidth:460, margin:"0 auto", paddingBottom:40 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <h2 style={{ color:T.text, fontWeight:800, fontSize:20 }}>Scoreboard</h2>
      </div>

      {tab !== "playlists" && (
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          <Sel value={fMode} onChange={setFMode} style={{ flex:1 }}>
            <option value="all">All modes</option>
            <option value="solo">Solo/Team</option>
            <option value="multi">Multiplayer</option>
          </Sel>
          {allPl.length > 0 && (
            <Sel value={fPl} onChange={setFPl} style={{ flex:1 }}>
              <option value="all">All playlists</option>
              {allPl.map(p => <option key={p} value={p}>{p}</option>)}
            </Sel>
          )}
        </div>
      )}

      <Tabs tabs={[{label:"Rankings",value:"rankings"},{label:"Players",value:"stats"},{label:"Playlists",value:"playlists"}]}
        active={tab} onChange={v => { setTab(v); setDetailP(null); setDetailPl(null); }} />
      <div style={{ marginBottom:14 }} />

      {tab==="rankings" && <>
        {/* Best vs Average toggle */}
        <div style={{ display:"flex", gap:4, background:T.surface, borderRadius:10, padding:4, marginBottom:10 }}>
          {[["avg","Averages"],["best","Best Game"]].map(([v,l]) => (
            <button key={v} onClick={() => setSortBy(prev => {
                // when switching view, reset to default sort for that view
                if (v==="avg") setSortDir("desc");
                return v==="avg" ? "avg_pts" : "best_pts";
              })}
              style={{ flex:1, padding:"7px 4px", borderRadius:8, border:"none",
                background: (sortBy.startsWith(v)) ? T.card : "transparent",
                color: (sortBy.startsWith(v)) ? T.text : T.muted,
                fontSize:13, fontWeight:600, cursor:"pointer", transition:"all .15s" }}>
              {l}
            </button>
          ))}
        </div>
        {/* Sort buttons */}
        <div style={{ display:"flex", gap:6, marginBottom:12 }}>
          {(sortBy.startsWith("avg")
            ? [["avg_pts","Pts/Game"],["avg_ppm","Pts/Min"],["avg_ratio","+/- Ratio"]]
            : [["best_pts","Most Pts"],["best_ppm","Pts/Min"],["best_ratio","+/- Ratio"]]
          ).map(([v,l]) => (
            <button key={v}
              onClick={() => { if(sortBy===v) setSortDir(d=>d==="desc"?"asc":"desc"); else { setSortBy(v); setSortDir("desc"); } }}
              style={{ flex:1, padding:"7px 4px", borderRadius:8, border:`1px solid ${sortBy===v?T.accent:T.border}`,
                background: sortBy===v?`${T.accent}22`:T.card, color: sortBy===v?T.accent:T.muted,
                fontSize:11, fontWeight:600, cursor:"pointer" }}>
              {l} {sortBy===v?(sortDir==="desc"?"↓":"↑"):""}
            </button>
          ))}
        </div>
        {sorted.length===0
          ? <div style={{ color:T.muted, textAlign:"center", padding:40 }}>No games yet</div>
          : sorted.map((r,i) => {
            const showAvg = sortBy.startsWith("avg");
            const mainVal = showAvg
              ? r.avgCorrect.toFixed(1)
              : (r.bestGame ? r.bestGame.correct : "—");
            const ratioStr = showAvg
              ? (r.avgRatio>0 ? r.avgRatio.toFixed(2) : "—")
              : (r.bestGame ? (isFinite(r.bestGame.ratio)?r.bestGame.ratio.toFixed(2):"∞") : "—");
            const ppmStr = showAvg
              ? r.avgPpm.toFixed(1)
              : (r.bestGame ? r.bestGame.ppm.toFixed(1) : "—");
            const ppsStr = showAvg
              ? r.avgPps.toFixed(2)
              : (r.bestGame ? r.bestGame.pps.toFixed(2) : "—");
            return (
              <Card key={r.key} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ color:i<3?T.accent:T.muted, fontSize:16, width:24 }}>
                    {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}
                  </span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ color:T.text, fontWeight:700 }}>{r.name}</div>
                    <div style={{ color:T.muted, fontSize:11, marginTop:2 }}>
                      {ppmStr}/min · {ppsStr}/song · {ratioStr} +/-
                    </div>
                  </div>
                  <div style={{ textAlign:"right", marginRight:4 }}>
                    <div style={{ color:T.accent, fontWeight:800, fontSize:18 }}>{mainVal}</div>
                    <div style={{ color:T.muted, fontSize:10 }}>{showAvg?"pts/game":"best pts"}</div>
                  </div>
                  <Btn variant="ghost" small onClick={() => setDetailP(r.key)}>→</Btn>
                </div>
              </Card>
            );
          })
        }
        <Modal open={!!detailP} onClose={() => setDetailP(null)} title={detailP && playerMap[detailP] ? playerMap[detailP].name : ""}>
          {detailP && playerMap[detailP] && <PlayerStatsCard p={playerMap[detailP]} />}
        </Modal>
      </>}

      {tab==="stats" && <PlayersTab playerMap={playerMap} />}

      {tab==="playlists" && <PlaylistTab playlistMap={playlistMap} detailPl={detailPl} setDetailPl={setDetailPl} />}
    </div>
  );
}

// ─── Players tab: searchable, sortable list with expandable stats ─────────────
function PlayersTab({ playerMap }) {
  const [search, setSearch]   = useState("");
  const [sortBy, setSortBy]   = useState("name"); // name | points | minutes
  const [expanded, setExpanded] = useState(null);

  let players = Object.values(playerMap);
  if (search.trim()) {
    const q = search.toLowerCase().trim();
    players = players.filter(p => p.name.toLowerCase().includes(q));
  }
  players = players.sort((a,b) => {
    if (sortBy==="name")    return a.name.localeCompare(b.name);
    if (sortBy==="points")  return b.correct - a.correct;
    if (sortBy==="minutes") return b.minutesPlayed - a.minutesPlayed;
    return 0;
  });

  return (
    <div>
      <TInput value={search} onChange={setSearch} placeholder="Search players…" style={{ marginBottom:10 }} />
      <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        {[["name","A–Z"],["points","Points"],["minutes","Minutes"]].map(([v,l]) => (
          <button key={v} onClick={() => setSortBy(v)}
            style={{ flex:1, padding:"7px 4px", borderRadius:8, border:`1px solid ${sortBy===v?T.accent:T.border}`,
              background: sortBy===v?`${T.accent}22`:T.card, color: sortBy===v?T.accent:T.muted,
              fontSize:12, fontWeight:600, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>

      {players.length===0
        ? <div style={{ color:T.muted, textAlign:"center", padding:40 }}>No players found</div>
        : players.map((p,i) => (
          <div key={p.key} style={{ marginBottom:8 }}>
            <div onClick={() => setExpanded(expanded===p.key?null:p.key)}
              style={{ display:"flex", alignItems:"center", gap:12, background:T.card,
                border:`1px solid ${T.border}`, borderRadius: expanded===p.key?"14px 14px 0 0":14,
                padding:"12px 14px", cursor:"pointer" }}>
              <div style={{ width:32, height:32, borderRadius:"50%", flexShrink:0, background:PC[i%PC.length],
                display:"flex", alignItems:"center", justifyContent:"center", color:"#0E1117", fontWeight:800, fontSize:13 }}>
                {p.name[0]?.toUpperCase()}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:T.text, fontWeight:700, fontSize:14 }}>{p.name}</div>
                <div style={{ color:T.muted, fontSize:11 }}>
                  {p.gameCount} game{p.gameCount!==1?"s":""} · {Math.round(p.minutesPlayed)}m
                </div>
              </div>
              <div style={{ textAlign:"right", marginRight:4 }}>
                <div style={{ color:T.accent, fontWeight:800, fontSize:18 }}>{p.correct}</div>
                <div style={{ color:T.muted, fontSize:10 }}>points</div>
              </div>
              <span style={{ color:T.muted, fontSize:16, transform:expanded===p.key?"rotate(90deg)":"none", transition:"transform .15s" }}>›</span>
            </div>
            {expanded===p.key && (
              <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderTop:"none",
                borderRadius:"0 0 14px 14px", padding:"4px 14px 14px" }}>
                <PlayerStatsCard p={p} compact />
              </div>
            )}
          </div>
        ))
      }
    </div>
  );
}

function PlayerStatsCard({ p, compact }) {
  const fmt = (n) => Number.isInteger(n) ? n : n.toFixed(1);

  function StatGrid({ stats }) {
    return (
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:4 }}>
        {stats.map(([label,val,color]) => (
          <div key={label} style={{ background:compact?T.card:T.surface, borderRadius:8, padding:"8px 10px" }}>
            <div style={{ color:T.muted, fontSize:10, textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</div>
            <div style={{ color:color||T.text, fontWeight:800, fontSize:16, marginTop:2 }}>{val}</div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <Lbl style={{ marginTop: compact?8:0 }}>Averages per game</Lbl>
      <StatGrid stats={[
        ["Points", p.avgCorrect.toFixed(1), T.accent],
        ["+/- Ratio", p.avgRatio>0?p.avgRatio.toFixed(2):"—", T.green],
        ["Pts / Min", p.avgPpm.toFixed(2), T.blue],
        ["Pts / Song", p.avgPps.toFixed(2), T.purple],
      ]} />

      <Lbl style={{ marginTop:14 }}>Best game <span style={{ color:T.muted, fontWeight:400, textTransform:"none", fontSize:10 }}>(min. 10 min)</span></Lbl>
      {p.bestGame ? (
        <StatGrid stats={[
          ["Points", p.bestGame.correct, T.accent],
          ["+/- Ratio", isFinite(p.bestGame.ratio)?p.bestGame.ratio.toFixed(2):"∞", T.green],
          ["Pts / Min", p.bestGame.ppm.toFixed(2), T.blue],
          ["Pts / Song", p.bestGame.pps.toFixed(2), T.purple],
        ]} />
      ) : (
        <div style={{ color:T.muted, fontSize:12, padding:"4px 0 8px", fontStyle:"italic" }}>
          No qualifying games yet (need 10+ minutes)
        </div>
      )}

      <Lbl style={{ marginTop:14 }}>All-time totals</Lbl>
      <StatGrid stats={[
        ["Games", p.gameCount, T.text],
        ["Points", p.correct, T.accent],
        ["Wrong", p.incorrect>0?fmt(p.incorrect):0, T.red],
        ["+/- Ratio", isFinite(p.overallRatio)?(p.overallRatio>0?p.overallRatio.toFixed(2):"—"):"∞", T.green],
        ["Minutes", Math.round(p.minutesPlayed), T.muted],
        ["Songs", p.songsPlayed, T.muted],
      ]} />

      <Lbl style={{ marginTop:14 }}>Category accuracy</Lbl>
      {[["title","Song Title 🎵"],["artist","Artist 🎤"],["album","Album 💿"]].map(([k,l]) => {
        const [c,pos] = p[k];
        if (!pos && k==="album") return null;
        const pct = pos ? Math.round((c/pos)*100) : 0;
        return (
          <div key={k} style={{ marginBottom:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
              <span style={{ color:T.muted, fontSize:12 }}>{l}</span>
              <span style={{ color:T.text, fontSize:12, fontWeight:600 }}>{fmtPct(c,pos)} ({c}/{pos})</span>
            </div>
            <div style={{ height:5, borderRadius:3, background:T.border }}>
              <div style={{ height:5, borderRadius:3, width:`${pct}%`, background:`linear-gradient(90deg,${T.accent},${T.accentL})` }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PlaylistTab({ playlistMap, detailPl, setDetailPl }) {
  const [expPlayer, setExpPlayer] = useState(null);
  const pls = Object.values(playlistMap);
  const sel = detailPl ? playlistMap[detailPl] : null;
  if (pls.length===0) return <div style={{ color:T.muted, textAlign:"center", padding:40 }}>No playlists recorded yet</div>;
  return (
    <>
      {pls.map(pl => (
        <Card key={pl.name} style={{ marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:22 }}>💽</span>
            <div style={{ flex:1 }}>
              <div style={{ color:T.text, fontWeight:700, fontSize:14 }}>{pl.name}</div>
              <div style={{ color:T.muted, fontSize:11, marginTop:2 }}>
                {pl.totalGames} game{pl.totalGames!==1?"s":""} · {pl.totalSongs} songs · {Math.round(pl.totalMinutes)}m
              </div>
              {pl.url && <div style={{ marginTop:4 }}><PlaylistLink url={pl.url} /></div>}
              <div style={{ display:"flex", gap:6, marginTop:5, flexWrap:"wrap" }}>
                {[["🎵","title"],["🎤","artist"],["💿","album"]].map(([icon,cat]) => {
                  const [c,p] = pl.cats[cat];
                  if (!p) return null;
                  return <span key={cat} style={{ fontSize:11, color:T.muted, background:T.surface, padding:"2px 7px", borderRadius:20 }}>{icon} {fmtPct(c,p)}</span>;
                })}
              </div>
            </div>
            <Btn variant="ghost" small onClick={() => { setDetailPl(pl.name); setExpPlayer(null); }}>→</Btn>
          </div>
        </Card>
      ))}
      <Modal open={!!sel} onClose={() => setDetailPl(null)} title={sel?.name||""}>
        {sel && <PlaylistDetail pl={sel} expPlayer={expPlayer} setExpPlayer={setExpPlayer} />}
      </Modal>
    </>
  );
}

function PlaylistDetail({ pl, expPlayer, setExpPlayer }) {
